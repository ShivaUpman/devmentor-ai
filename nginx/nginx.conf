# nginx.conf — Reverse proxy for DevMentor AI
#
# WHY Nginx instead of exposing FastAPI directly?
#   1. SSL termination: Nginx handles HTTPS. FastAPI only speaks HTTP internally.
#      This is called "SSL offloading" — the encrypted connection ends at Nginx.
#   2. Static file serving: Nginx serves static files 10x faster than Python.
#   3. Rate limiting: Nginx can block abusive clients before they hit Python.
#   4. Load balancing: Nginx round-robins across multiple FastAPI instances.
#   5. Security: Nginx is hardened for public internet exposure. FastAPI is not.
#
# Interview question: "What is a reverse proxy?"
# Answer: A server that sits between the internet and your backend servers.
#   It receives all requests, then forwards them to the appropriate service.
#   The client never knows the real address of your backend.

# Rate limiting zone definition
# WHY rate limiting at the Nginx level?
#   It's cheaper. Python never even wakes up for blocked requests.
#   "10m" = 10MB of memory for the rate limit state (~160,000 IP addresses)
#   "10r/s" = allow 10 requests per second per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Upstream blocks define the backend services Nginx forwards to.
# "backend" and "ml" are Docker service names — resolved by Docker DNS.
upstream backend {
    server backend:8000;
    # In production, add more servers for load balancing:
    # server backend_2:8000;
    # server backend_3:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name localhost;

    # ── Security headers ────────────────────────────────────────────────────────
    # WHY these headers?
    #   X-Content-Type-Options: prevents browser MIME-sniffing attacks
    #   X-Frame-Options: prevents clickjacking (loading your site in an iframe)
    #   X-XSS-Protection: legacy XSS filter (modern browsers ignore, but harmless)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Hide Nginx version ──────────────────────────────────────────────────────
    # Don't tell attackers what version you're running
    server_tokens off;

    # ── API routes → FastAPI ────────────────────────────────────────────────────
    location /api/ {
        # Apply rate limiting. "burst=20" allows up to 20 queued requests.
        # "nodelay" rejects immediately rather than queuing after the burst.
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend;

        # WHY these proxy headers?
        #   When Nginx forwards the request, FastAPI sees Nginx's IP (127.0.0.1)
        #   as the client. These headers pass the REAL client IP through.
        #   Required for: logging, rate limiting by real IP, geo-blocking.
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts — prevent slow clients from holding connections forever
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── Health check → FastAPI ──────────────────────────────────────────────────
    location /health {
        proxy_pass http://backend/health;
        proxy_set_header Host $host;
        access_log off;  # Don't log health check noise
    }

    # ── Frontend → Next.js ──────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support — needed for Next.js hot reload in development
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

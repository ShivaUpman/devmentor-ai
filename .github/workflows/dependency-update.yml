# dependency-update.yml — Automated dependency security updates
#
# WHY automated dependency updates?
#   Dependencies accumulate security vulnerabilities over time.
#   Left unpatched, they become attack vectors (Log4Shell, OpenSSL CVEs).
#   Manual updates are forgotten. Automation ensures constant hygiene.
#
# This workflow runs weekly, checks for outdated/vulnerable packages,
# and opens a PR with the updates for human review.
#
# Industry usage: GitHub Dependabot, Renovate Bot, Snyk.
# We implement a lightweight version using pip-audit + a shell script.

name: Dependency Update Check

on:
  schedule:
    # WHY weekly on Monday morning?
    #   Teams are fresh. Issues are caught before the week's development begins.
    #   Cron format: minute hour day-of-month month day-of-week
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  check-python-deps:
    name: Check Python Dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check for vulnerabilities
        run: |
          pip install pip-audit safety
          pip-audit -r backend/requirements.txt -o json > audit-results.json || true
          pip-audit -r ml/requirements.txt -o json >> audit-results.json || true
          cat audit-results.json

      - name: Check for outdated packages
        run: |
          pip install pip-check-reqs
          cd backend && pip install -r requirements.txt -q && pip list --outdated

      - name: Upload audit results
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit
          path: audit-results.json
          retention-days: 30

  check-node-deps:
    name: Check Node Dependencies
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit npm packages
        run: |
          cd frontend
          npm ci
          # npm audit exits non-zero if vulnerabilities found
          # We capture the output but don't fail the job (report only)
          npm audit --json > npm-audit.json || true
          npm audit || true

      - name: Check for outdated packages
        run: cd frontend && npm outdated || true

      - name: Upload npm audit
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit
          path: frontend/npm-audit.json
          retention-days: 30

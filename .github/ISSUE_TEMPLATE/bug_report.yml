name: Bug Report
description: File a bug report
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options: [Low, Medium, High, Critical]
    validations:
      required: true
